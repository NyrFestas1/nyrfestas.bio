<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Nyr Festas — Em Breve</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Nunito:wght@400;600;700;800;900&display=swap"
    rel="stylesheet" />
            <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/dbcz5yhgs/image/upload/v1772106248/LOGO_NYR_ufn70y.png">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #004AAD;
      --blue-dark: #003080;
      --blue-light: #EBF1FF;
      --gold: #F4B400;
      --gold-dark: #C98F00;
      --ink: #1A1A1A;
      --ink-soft: #3D3D3D;
      --muted: rgba(26, 26, 26, 0.5);
      --white: #FFFFFF;
      --green-wa: #25D366;
      --border: rgba(0, 74, 173, 0.15);
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Nunito', sans-serif;
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
      background: #EEF2FF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 48px;
    }

    /* fundo animado idêntico ao da bio */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 20%, rgba(244, 180, 0, 0.15) 0%, transparent 65%),
        radial-gradient(ellipse 55% 50% at 85% 75%, rgba(0, 74, 173, 0.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 45% at 55% 45%, rgba(244, 180, 0, 0.06) 0%, transparent 70%),
        linear-gradient(150deg, #EEF2FF 0%, #E0E9FF 45%, #EDF3FF 100%);
      background-size: 200% 200%, 200% 200%, 200% 200%, 100% 100%;
      animation: bgShift 14s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes bgShift {
      0% {
        background-position: 0% 0%, 100% 100%, 50% 50%, 0% 0%;
      }

      33% {
        background-position: 30% 60%, 70% 30%, 20% 80%, 0% 0%;
      }

      66% {
        background-position: 70% 20%, 20% 80%, 80% 20%, 0% 0%;
      }

      100% {
        background-position: 100% 100%, 0% 0%, 50% 50%, 0% 0%;
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes waGlow {

      0%,
      100% {
        box-shadow: 0 4px 20px rgba(37, 211, 102, 0.45), 0 0 0 0 rgba(37, 211, 102, 0.35);
      }

      50% {
        box-shadow: 0 6px 28px rgba(37, 211, 102, 0.55), 0 0 0 8px rgba(37, 211, 102, 0);
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 36px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow:
        0 2px 0 rgba(0, 74, 173, 0.06),
        0 12px 40px rgba(0, 74, 173, 0.10),
        0 32px 80px rgba(0, 0, 0, 0.07);
      animation: cardIn 0.65s cubic-bezier(.22, 1, .36, 1) both;
    }

    /* ── LOGO ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .logo-wrap img {
      width: 100px;
      height: 100px;
      object-fit: contain;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* ── BADGE EM BREVE ── */
    .badge-soon {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--blue-light);
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blue);
      animation: fadeUp 0.55s ease 0.14s both;
    }

    .badge-soon .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: spin 1.8s linear infinite;
      flex-shrink: 0;
    }

    /* ── HEADLINE ── */
    .headline {
      text-align: center;
      animation: fadeUp 0.55s ease 0.2s both;
    }

    .headline h1 {
      font-family: 'Anton', sans-serif;
      font-size: clamp(1.8rem, 7vw, 2.4rem);
      color: var(--blue);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .headline h1 span {
      color: var(--gold);
    }

    .headline p {
      margin-top: 10px;
      font-size: clamp(0.88rem, 3.2vw, 0.98rem);
      font-weight: 700;
      color: var(--ink-soft);
      line-height: 1.65;
    }

    .headline p strong {
      color: var(--blue);
    }

    /* ── SLOGAN ── */
    .slogan {
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 900;
      font-style: italic;
      color: var(--gold-dark);
      padding: 4px 16px;
      background: rgba(244, 180, 0, 0.1);
      border: 1.5px solid rgba(244, 180, 0, 0.32);
      border-radius: 99px;
      animation: fadeUp 0.55s ease 0.26s both;
    }

    /* ── BOTÕES ── */
    .buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.55s ease 0.32s both;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.9rem, 3.4vw, 1rem);
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      border: none;
      letter-spacing: 0.01em;
      transition: transform 0.13s, box-shadow 0.13s, color 0.22s, background 0.22s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* WhatsApp — CTA principal */
    .btn-whatsapp {
      background: var(--green-wa);
      color: #fff;
      animation: waGlow 2.4s ease-in-out infinite;
    }

    .btn-whatsapp:hover {
      background: #1db954;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(37, 211, 102, 0.55);
    }

    /* Outline — telefone e e-mail */
    .btn-outline {
      background: transparent;
      color: var(--blue);
      border: 2px solid var(--blue);
      z-index: 0;
    }

    .btn-outline::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--blue);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s cubic-bezier(.22, 1, .36, 1);
      z-index: -1;
      border-radius: 10px;
    }

    .btn-outline:hover {
      color: var(--white);
    }

    .btn-outline:hover::before {
      transform: scaleX(1);
    }

    .btn-icon {
      font-size: 1.15rem;
      flex-shrink: 0;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    /* ── VOLTAR ── */
    .back-link {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.15s;
      animation: fadeUp 0.55s ease 0.44s both;
    }

    .back-link:hover {
      color: var(--blue);
    }

    /* ── FOOTER ── */
    .footer {
      font-size: 0.63rem;
      color: var(--muted);
      text-align: center;
      animation: fadeUp 0.55s ease 0.5s both;
    }

    .footer span {
      color: var(--blue);
      font-weight: 700;
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      body {
        padding-bottom: calc(48px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
